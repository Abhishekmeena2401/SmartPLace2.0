<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs | SmartPlace</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px;
      max-width: 440px; margin-bottom: 28px;
    }
    .search-bar input {
      border: none; background: none; outline: none;
      font-family: inherit; font-size: 0.875rem; color: var(--text); width: 100%;
    }

    .job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .job-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      box-shadow: var(--shadow); transition: var(--transition);
      display: flex; flex-direction: column; gap: 8px;
    }
    .job-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(26,86,219,.1);
    }

    .job-card h3 { font-size: 0.975rem; font-weight: 700; line-height: 1.3; }
    .company-name { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
    .location     { font-size: 0.78rem; color: var(--muted); }
    .desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin: 6px 0; }

    .salary {
      font-size: 0.875rem; font-weight: 600; color: var(--text);
    }

    .apply-link {
      margin-top: auto; display: inline-block;
      padding: 9px 18px; background: var(--accent); color: #fff;
      text-decoration: none; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600; transition: var(--transition);
      align-self: flex-start;
    }
    .apply-link:hover { background: #1546b0; }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:0.9rem; }
    .error-msg { color: var(--danger); font-size:0.875rem; margin-bottom:16px; }

    .tag { background: var(--surface); border: 1px solid var(--border); padding: 3px 8px; border-radius: 5px; font-size: 0.72rem; font-weight: 500; }
    .tags { display:flex; flex-wrap:wrap; gap:5px; margin: 4px 0; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="page-header">
      <h1>Job Board</h1>
      <p>Browse the latest remote and on-site openings from companies worldwide.</p>
    </div>

    <div class="search-bar">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by title or company…" oninput="filterJobs()" />
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="job-grid" id="jobGrid">
      <div class="empty">Loading jobs…</div>
    </div>
  </main>
</div>

<script src="nav.js"></script>
<script>
let allJobs = [];

function stripHTML(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

async function loadJobs() {
  try {
    const res  = await fetch('/api/jobs');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allJobs = Array.isArray(data) ? data : (data.jobs || []);
    renderJobs(allJobs.slice(0, 18));
  } catch (err) {
    document.getElementById('errorMsg').textContent = '⚠️ Job feed unavailable — backend endpoint /api/jobs not connected.';
    document.getElementById('jobGrid').innerHTML    = '<div class="empty">No jobs to display right now.</div>';
  }
}

function renderJobs(jobs) {
  const grid = document.getElementById('jobGrid');
  if (!jobs.length) { grid.innerHTML = '<div class="empty">No jobs match your search.</div>'; return; }
  grid.innerHTML = jobs.map(j => `
    <div class="job-card">
      <h3>${j.title || 'Untitled Role'}</h3>
      <div class="company-name">🏢 ${j.company_name || j.company || 'Unknown Company'}</div>
      <div class="location">📍 ${j.candidate_required_location || j.location || 'Remote / Not specified'}</div>
      ${j.tags?.length ? `<div class="tags">${j.tags.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
      <div class="desc">${stripHTML(j.description || '').slice(0, 130)}…</div>
      ${j.salary ? `<div class="salary">${j.salary}</div>` : ''}
      <a href="${j.url || '#'}" target="_blank" class="apply-link">Apply Now →</a>
    </div>
  `).join('');
}

function filterJobs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderJobs(allJobs.filter(j =>
    (j.title || '').toLowerCase().includes(q) ||
    (j.company_name || j.company || '').toLowerCase().includes(q)
  ).slice(0, 18));
}

loadJobs();
</script>
</body>
</html>
