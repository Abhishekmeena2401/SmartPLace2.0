<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Analyzer | SmartPlace</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      transition: var(--transition);
      cursor: pointer;
      background: var(--surface);
      margin-bottom: 20px;
    }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: var(--accent-lt); }
    .upload-area input { display: none; }
    .upload-icon { font-size: 2rem; margin-bottom: 12px; }
    .upload-area h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .upload-area p  { font-size: 0.83rem; color: var(--muted); }
    .file-name { margin-top: 10px; font-size: 0.83rem; color: var(--accent); font-weight: 500; }

    .analyze-btn {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: var(--transition);
    }
    .analyze-btn:hover:not(:disabled) { background: #1546b0; }
    .analyze-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    #status {
      margin-top: 14px; font-size: 0.85rem; font-weight: 500;
      color: var(--accent); min-height: 20px; text-align: center;
    }

    #result {
      display: none;
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      font-size: 0.875rem;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: 'DM Mono', monospace;
      max-height: 500px;
      overflow-y: auto;
      color: var(--text);
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-wrap {
      max-width: 620px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      box-shadow: var(--shadow);
    }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="page-header">
      <h1>Resume Analyzer</h1>
      <p>Upload your PDF resume and get instant AI-powered ATS feedback.</p>
    </div>

    <div class="card-wrap">
      <div class="upload-area" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📄</div>
        <h3>Drop your resume here</h3>
        <p>or click to browse — PDF only</p>
        <input type="file" id="fileInput" accept="application/pdf" />
        <div class="file-name" id="fileName"></div>
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="upload()" disabled>
        Analyze Resume
      </button>

      <p id="status"></p>
      <pre id="result"></pre>
    </div>
  </main>
</div>

<script src="nav.js"></script>
<script>
  const fileInput  = document.getElementById('fileInput');
  const dropzone   = document.getElementById('dropzone');
  const fileNameEl = document.getElementById('fileName');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const statusEl   = document.getElementById('status');
  const resultEl   = document.getElementById('result');

  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) { fileInput.files = e.dataTransfer.files; handleFile(file); }
  });

  function handleFile(file) {
    if (!file) return;
    if (file.type !== 'application/pdf') {
      statusEl.textContent = '⚠️ Please upload a PDF file.';
      analyzeBtn.disabled = true;
      return;
    }
    fileNameEl.textContent = '📎 ' + file.name;
    analyzeBtn.disabled = false;
    statusEl.textContent = '';
    resultEl.style.display = 'none';
  }

  async function upload() {
    const file = fileInput.files[0];
    if (!file) { statusEl.textContent = '⚠️ Please select a file first.'; return; }

    analyzeBtn.disabled = true;
    analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing…';
    statusEl.textContent = '';
    resultEl.style.display = 'none';

    const formData = new FormData();
    formData.append('resume', file);

    try {
      const res  = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok || data.error) {
        statusEl.textContent = '❌ ' + (data.error || 'Server error');
      } else {
        statusEl.textContent = '✅ Analysis complete';
        resultEl.textContent  = data.result;
        resultEl.style.display = 'block';
      }
    } catch (err) {
      statusEl.textContent = '⚠️ Could not reach server. Is it running?';
    } finally {
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = 'Analyze Resume';
    }
  }
</script>
</body>
</html>
