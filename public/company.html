<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companies | SmartPlace</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* Search */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px;
      max-width: 400px; margin-bottom: 28px;
    }
    .search-bar input {
      border: none; background: none; outline: none;
      font-family: inherit; font-size: 0.875rem; color: var(--text); width: 100%;
    }
    .search-bar svg { flex-shrink: 0; color: var(--muted); }

    /* Grid */
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .company-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      cursor: pointer; transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .company-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(26,86,219,.1);
    }

    .company-logo {
      width: 48px; height: 48px;
      background: var(--accent-lt); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800; color: var(--accent);
      margin-bottom: 16px;
    }

    .company-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .company-card p  { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 16px; }

    .pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.73rem; font-weight: 600;
    }
    .pill-green { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
    .pill-blue  { background: var(--accent-lt); color: var(--accent); border: 1px solid #c7d9ff; }
    .pill-red   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.5); backdrop-filter: blur(4px);
      justify-content: center; align-items: center;
      z-index: 300; padding: 20px;
    }
    .modal.open { display: flex; }

    .modal-box {
      background: var(--bg); border-radius: 18px;
      width: 100%; max-width: 600px;
      max-height: 88vh; overflow-y: auto;
      padding: 36px; position: relative;
      animation: slideUp .3s ease;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .modal-close {
      position: absolute; top: 20px; right: 20px;
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; color: var(--muted);
      transition: var(--transition);
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-box h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .modal-desc   { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }

    .detail-row   { display: flex; gap: 12px; margin-bottom: 10px; font-size: 0.875rem; }
    .detail-label { font-weight: 600; color: var(--muted); min-width: 100px; flex-shrink: 0; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag  { background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 0.78rem; font-weight: 500; }

    .apply-btn {
      display: block; margin-top: 28px; padding: 14px;
      text-align: center; background: var(--accent); color: #fff;
      text-decoration: none; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem;
      transition: var(--transition);
    }
    .apply-btn:hover { background: #1546b0; }

    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }

    .diff-hard   { background:#fff1f2; color:#be123c; border:1px solid #fecdd3; }
    .diff-medium { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
    .diff-easy   { background:#f0fdf4; color:#166534; border:1px solid #dcfce7; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>
<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="page-header">
      <h1>Target Companies</h1>
      <p>Explore hiring companies, packages, and interview details.</p>
    </div>

    <div class="search-bar">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search company or role…" oninput="filterCards()" />
    </div>

    <div class="company-grid" id="grid">
      <div class="empty">Loading companies…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalData"></div>
  </div>
</div>

<script src="nav.js"></script>
<script>
let companies = [];

const mockCompanies = [
  {
    name: "Google",
    summary: "Cloud, Search, AI — global technology leader.",
    description: "Google LLC is a subsidiary of Alphabet Inc., specializing in internet-related services, cloud computing, and AI research.",
    location: "Mountain View / Bengaluru", package: "32–45 LPA", cgpa: "8.5+",
    difficulty: "Hard", roles: ["Software Engineer","SRE"],
    skills: ["DSA","System Design","Python/Go"],
    rounds: ["Online Assessment","3× Technical","HR"], eligibility: "B.Tech/M.Tech CS/IT", apply: "#"
  },
  {
    name: "Microsoft",
    summary: "Software, Azure cloud & AI ecosystem.",
    description: "Microsoft Corporation builds software products, cloud services (Azure), and developer tools used worldwide.",
    location: "Hyderabad / Noida", package: "28–40 LPA", cgpa: "8.0+",
    difficulty: "Medium", roles: ["SWE","PM","SDET"],
    skills: ["Problem Solving","OOP","C#/Java"],
    rounds: ["Coding Test","Technical","Managerial"], eligibility: "All Tech Branches", apply: "#"
  },
  {
    name: "Amazon",
    summary: "E-commerce, AWS, and logistics tech.",
    description: "Amazon's tech division covers AWS (cloud), Alexa, logistics optimization, and large-scale distributed systems.",
    location: "Bengaluru / Hyderabad", package: "25–42 LPA", cgpa: "7.5+",
    difficulty: "Medium", roles: ["SDE I","Cloud Support","Data Engineer"],
    skills: ["Java","AWS","System Design","SQL"],
    rounds: ["OA","2× Tech","Bar Raiser","HR"], eligibility: "B.Tech CS/IT/ECE", apply: "#"
  }
];

async function loadCompanies() {
  companies = mockCompanies;
  renderCards();
  try {
    const res  = await fetch('/api/companies');
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.length > 0) { companies = data; renderCards(); }
  } catch (_) { console.log('Using mock company data.'); }
}

function diffClass(d = '') {
  const l = d.toLowerCase();
  if (l.includes('hard')) return 'diff-hard';
  if (l.includes('easy')) return 'diff-easy';
  return 'diff-medium';
}

function renderCards(list = companies) {
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty">No companies found.</div>'; return; }
  grid.innerHTML = list.map((c, i) => `
    <div class="company-card" onclick="showDetails(${i})">
      <div class="company-logo">${(c.name || '?')[0]}</div>
      <h3>${c.name || 'Unknown'}</h3>
      <p>${c.summary || ''}</p>
      <span class="pill pill-green">CGPA: ${c.cgpa || 'N/A'}</span>
      &nbsp;
      <span class="pill ${diffClass(c.difficulty)}">${c.difficulty || 'N/A'}</span>
    </div>
  `).join('');
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderCards(companies.filter(c =>
    (c.name || '').toLowerCase().includes(q) ||
    (c.roles || []).some(r => r.toLowerCase().includes(q)) ||
    (c.skills || []).some(s => s.toLowerCase().includes(q))
  ));
}

function showDetails(i) {
  const c = companies[i];
  document.getElementById('modalData').innerHTML = `
    <h2>${c.name || ''}</h2>
    <p class="modal-desc">${c.description || 'No description available.'}</p>
    <div class="detail-row"><span class="detail-label"> Location</span><span>${c.location || 'N/A'}</span></div>
    <div class="detail-row"><span class="detail-label"> Package</span><span>${c.package || 'N/A'}</span></div>
    <div class="detail-row"><span class="detail-label"> CGPA</span><span>${c.cgpa || 'N/A'}</span></div>
    <div class="detail-row"><span class="detail-label"> Difficulty</span><span>${c.difficulty || 'N/A'}</span></div>
    <div class="detail-row"><span class="detail-label"> Eligibility</span><span>${c.eligibility || 'N/A'}</span></div>
    <div style="margin-top:16px">
      <div class="detail-label">Roles</div>
      <div class="tags">${(c.roles || []).map(r => `<span class="tag">${r}</span>`).join('') || '—'}</div>
    </div>
    <div style="margin-top:14px">
      <div class="detail-label">Skills Required</div>
      <div class="tags">${(c.skills || []).map(s => `<span class="tag">${s}</span>`).join('') || '—'}</div>
    </div>
    <div style="margin-top:14px">
      <div class="detail-label">Interview Rounds</div>
      <div class="tags">${(c.rounds || []).map(r => `<span class="tag">${r}</span>`).join('') || '—'}</div>
    </div>
    ${c.apply && c.apply !== '#' ? `<a href="${c.apply}" target="_blank" class="apply-btn">Apply Now →</a>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
window.addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

loadCompanies();
</script>
</body>
</html>
